name: msar_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_riverpod: ^3.2.1
  dio: ^5.9.1
  intl: ^0.20.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Local persistence (SQLite)
  sqflite: ^2.4.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true

  uses-material-design: true

  assets:
    - assets/images/mihwar_logo.png
    - assets/data/predicted_bins.json
    - assets/data/predicted_bins_for_flutter.json
    - assets/data/predicted_bins_multiround_flutter.json

# Generate launcher icons: flutter pub get && dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/images/mihwar_logo.png
  android: true
  ios: true
